# Required secret: set one of ANTHROPIC_API_KEY, OPENAI_API_KEY, or GEMINI_API_KEY
# in repo Settings → Secrets and variables → Actions, then update the env + --model below.
#
# Triggers:
#   - Automatically on PR open
#   - On demand: comment '/crev' on any PR to re-run
name: crev code review
on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == '/crev')
    permissions:
      pull-requests: write
    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}"   >> $GITHUB_OUTPUT
            echo "base=${{ github.event.pull_request.base.sha }}"   >> $GITHUB_OUTPUT
            echo "head=${{ github.sha }}"                           >> $GITHUB_OUTPUT
          else
            PR=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} 2>&1)
            BASE=$(echo "$PR" | jq -r '.base.sha // empty' 2>/dev/null)
            HEAD=$(echo "$PR" | jq -r '.head.sha // empty' 2>/dev/null)
            if [ -z "$BASE" ] || [ -z "$HEAD" ]; then
              echo "::error::Could not resolve PR #${{ github.event.issue.number }}" >&2
              exit 1
            fi
            echo "number=${{ github.event.issue.number }}"          >> $GITHUB_OUTPUT
            echo "base=$BASE"                                        >> $GITHUB_OUTPUT
            echo "head=$HEAD"                                        >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head }}

      - name: Install crev
        run: curl -fsSL https://raw.githubusercontent.com/starc007/crev/main/install.sh | sh

      - name: Run crev review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          crev review \
            --commits ${{ steps.pr.outputs.base }}..${{ steps.pr.outputs.head }} \
            --model gemini-3.1-flash-lite-preview \
            --json > findings.json

      - name: Post findings to PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os, sys

          # Load findings — guard against missing/broken file
          try:
              with open('findings.json') as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              data = {'findings': [], 'github_annotations': []}

          # Emit inline annotations on the PR diff
          for a in data.get('github_annotations', []):
              level = {'failure': 'error', 'warning': 'warning', 'notice': 'notice'}.get(
                  a['annotation_level'], 'notice'
              )
              print(f"::{level} file={a['path']},line={a['start_line']}::{a['message']}")

          # Build summary comment body
          findings = data.get('findings', [])
          high = [f for f in findings if f['severity'] == 'High']
          med  = [f for f in findings if f['severity'] == 'Med']
          low  = [f for f in findings if f['severity'] == 'Low']

          if not findings or all(f['severity'] == 'Lgtm' for f in findings):
              body = '**crev** \u2705 \u2014 no issues found'
          else:
              lines = ['**crev review**\n']
              for f in high:
                  lines.append(f"\U0001f534 **HIGH** `{f['file']}`:{f.get('line','?')} \u2014 {f['message']}")
              for f in med:
                  lines.append(f"\U0001f7e1 **MED**  `{f['file']}`:{f.get('line','?')} \u2014 {f['message']}")
              for f in low:
                  lines.append(f"\U0001f535 **LOW**  `{f['file']}`:{f.get('line','?')} \u2014 {f['message']}")
              counts = []
              if high: counts.append(f'{len(high)} high')
              if med:  counts.append(f'{len(med)} med')
              if low:  counts.append(f'{len(low)} low')
              lines.append(f'\n_{", ".join(counts)} \u00b7 powered by [crev](https://github.com/starc007/crev)_')
              body = '\n'.join(lines)

          # Post or update comment — no spam on repeated triggers
          pr   = os.environ.get('PR_NUMBER')
          repo = os.environ.get('GITHUB_REPOSITORY')
          if not pr or not repo:
              sys.exit(0)

          result = subprocess.run(
              ['gh', 'api', f'repos/{repo}/issues/{pr}/comments',
               '--jq', '.[] | select(.body | startswith("**crev")) | .id'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"::warning::crev: could not fetch PR comments: {result.stderr.strip()}", file=sys.stderr)
          comment_id = result.stdout.strip().splitlines()[0] if result.returncode == 0 and result.stdout.strip() else None

          if comment_id:
              r = subprocess.run(
                  ['gh', 'api', '--method', 'PATCH',
                   f'repos/{repo}/issues/comments/{comment_id}',
                   '-f', f'body={body}'],
                  capture_output=True, text=True
              )
              if r.returncode != 0:
                  print(f"::warning::crev: could not update comment: {r.stderr.strip()}", file=sys.stderr)
          else:
              r = subprocess.run(
                  ['gh', 'pr', 'comment', pr, '--body', body],
                  capture_output=True, text=True
              )
              if r.returncode != 0:
                  print(f"::warning::crev: could not post comment: {r.stderr.strip()}", file=sys.stderr)
          PYEOF

      - name: Fail on HIGH findings
        run: |
          python3 -c "
          import json, sys
          try:
              with open('findings.json') as f:
                  d = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              sys.exit(0)
          high = [x for x in d.get('findings', []) if x['severity'] == 'High']
          if high:
              print(f'Blocking merge: {len(high)} HIGH finding(s)')
              sys.exit(1)
          "
