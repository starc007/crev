name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest    # ARM runner, cross-compiles to x86_64 via Xcode SDK
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest    # ARM runner — native aarch64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux native only)
        if: runner.os == 'Linux' && !matrix.cross
        run: strip target/${{ matrix.target }}/release/crev

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf crev-${{ matrix.target }}.tar.gz crev
          sha256sum crev-${{ matrix.target }}.tar.gz > crev-${{ matrix.target }}.tar.gz.sha256
          mv crev-${{ matrix.target }}.tar.gz* ../../../

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crev-${{ matrix.target }}
          path: |
            crev-${{ matrix.target }}.tar.gz
            crev-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "crev ${{ github.ref_name }}" \
            --generate-notes \
            crev-*.tar.gz \
            crev-*.tar.gz.sha256
